<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donda Digital | Vortex Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #04060f;
      --cyan: #00f0ff;
      --border: rgba(0,240,255,0.15);
      --text: #cdd8f0;
      --font-display: 'Orbitron', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: 'Space Mono', monospace;
      overflow: hidden; /* Aby to v práci nevypadalo rozbitě */
    }

    #hero {
      display: grid;
      grid-template-columns: 1fr 1fr; /* Půlka text, půlka 3D */
      height: 100vh;
      align-items: center;
    }

    .hero-copy {
      padding: 60px;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .hero-headline span {
      color: var(--cyan);
    }

    /* Tady je ten tvůj prostor vpravo */
    .hero-spline {
      position: relative;
      width: 100%;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame-wrapper {
      width: 90%;
      height: 90%;
      border: 1px solid var(--border);
      position: relative;
      background: rgba(0,0,0,0.3);
    }

    /* Rohové ozdoby */
    .frame-wrapper::before, .frame-wrapper::after {
      content: ''; position: absolute; width: 30px; height: 30px;
      border-color: var(--cyan); border-style: solid;
    }
    .frame-wrapper::before { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .frame-wrapper::after { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 900px) {
      #hero { grid-template-columns: 1fr; }
      .hero-spline { height: 50vh; }
    }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-copy">
    <h1 class="hero-headline">
      WE BUILD<br/>
      <span>DIGITAL</span><br/>
      FUTURES
    </h1>
    <p style="margin-top: 20px; color: #4a5880;">Testing the Spline Glass Vortex integration.</p>
  </div>

  <div class="hero-spline">
    <div class="frame-wrapper">
      <iframe src='https://my.spline.design/glassknotvortex-PONXp7Pv60mvlA8Zb4uKpGFH/' frameborder='0'></iframe>
    </div>
  </div>
</section>

</body>
</html>
